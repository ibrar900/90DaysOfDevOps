name: matrix strategy
on:
  push:
    branches: [main]
    paths:
      - "matrix/**"

jobs:
  matrix:
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: [3.10, 3.11, 3.12]
        exclude:
          - os: windows-latest
            python-version: "3.10"
    runs-on: ${{matrix.os}}
    steps:
      - name: installing python version ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: print python version
        run: python --version
